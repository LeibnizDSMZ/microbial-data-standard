[project]
variant = "classic"
site_name = "Microbial Data Standard"
site_description = "Modern microbial data standardization"
site_author = "Bioindustry 4.0 WP6"
site_dir = "public/docs"
docs_dir = "docs"
use_directory_urls = true
extra_css = [
    "css/extra.css",
]
copyright = "Copyright &copy; 2026 Leibniz Institute DSMZ-German Collection of Microorganisms and Cell Cultures GmbH, Maintained by the WP6 Team of the <a href='https://www.bioindustry4.eu/'>Bioindustry 4.0 project</a>"
language = "en"
repo_name = "LeibnizDSMZ/microbial-data-standard"
repo_url = "https://github.com/LeibnizDSMZ/microbial-data-standard"
repo_license = "MIT"

[project.theme]
features = [
    "header.autohide",
    "navigation.tabs",
    "navigation.top",
    "toc.integrate",
    "navigation.prune",
    "navigation.instant",
]
font = false
logo = "images/transparent_white_thick.png"

[project.theme.icon]
repo = "fontawesome/brands/git-alt"

[project.theme.palette]
primary = "custom"
accent = "custom"

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.abbr]

[project.markdown_extensions.toc]
toc_depth = 1
permalink = "#"
baselevel = 1
separator = "_"

[project.plugins.search]

[project.plugins.autorefs]

[project.plugins.literate_nav]
nav_file = "README.md"
implicit_index = true

[project.plugins.mkdocstrings.handlers.python]
inventories = [
    "https://docs.python.org/3/objects.inv",
]
paths = [
    "packages/microbial_strain_data_model/src",
    "packages/microbial_strain_data_utils/src",
]

[project.plugins.mkdocstrings.handlers.python.options]
heading_level = 2
allow_inspection = true
show_submodules = true
show_root_heading = false
unwrap_annotated = true
show_source = true
show_bases = true
show_if_no_docstring = false
merge_init_into_class = true
separate_signature = true
signature_crossrefs = true
filters = [
    "!^_",
    "!^__",
]
extensions = [
    { griffe_pydantic = { schema = false } },
]

[[project.nav]]
About = [
    "index.md",
    "background.md",
    "technical.md",
    "license.md",
]

[[project.nav]]
"Data schema" = [
    "schema/01. primaryId.md",
    "schema/02. organismType.md",
    "schema/03. morphType.md",
    "schema/04. typeStrain.md",
    "schema/05. taxon.md",
    "schema/06. identifier.md",
    "schema/07. origin.md",
    "schema/08. legal.md",
    "schema/09. pathogenicity.md",
    "schema/10. bioSafety.md",
    "schema/11. morphology.md",
    "schema/12. wallConstituents.md",
    "schema/13. staining.md",
    "schema/14. sporeFormation.md",
    "schema/15. growthConditions.md",
    "schema/16. cultivationMedia.md",
    "schema/17. sequences.md",
    "schema/18. gcContent.md",
    "schema/19. fattyAcidProfiles.md",
    "schema/20. hemolysis.md",
    "schema/21. halophily.md",
    "schema/22. tolerances.md",
    "schema/23. enzymes.md",
    "schema/24. metabolites.md",
    "schema/25. knownApplications.md",
    "schema/26. collections.md",
    "schema/27. literature.md",
    "schema/28. otherMedia.md",
    "schema/29. relatedData.md",
    "schema/30. sources.md",
]

[[project.nav]]
Python = [
    "python/microbe.md",
    "python/sub_classes.md",
]

[[project.nav]]
Graph = [
    "graph.md",
]

[[project.nav]]
Examples = [
    "examples/bacteria.md",
    "examples/fungi.md",
]
