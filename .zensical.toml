[project]
variant = "classic"
site_name = "Microbial Data Standard"
site_description = "Modern microbial data standardization"
site_author = "Bioindustry 4.0 WP6"
site_dir = "public/docs"
docs_dir = "docs"
use_directory_urls = true
extra_css = [
    "css/extra.css",
]
copyright = "Copyright &copy; 2026 Leibniz Institute DSMZ-German Collection of Microorganisms and Cell Cultures GmbH, Maintained by the WP6 Team of the <a href='https://www.bioindustry4.eu/'>Bioindustry 4.0 project</a>"
language = "en"
repo_name = "LeibnizDSMZ/microbial-data-standard"
repo_url = "https://github.com/LeibnizDSMZ/microbial-data-standard"
repo_license = "MIT"

[project.theme]
features = [
    "header.autohide",
    "navigation.tabs",
    "navigation.top",
    "toc.integrate",
    "navigation.prune",
    "navigation.instant",
]
font = false
logo = "images/transparent_white_thick.png"

[project.theme.icon]
repo = "fontawesome/brands/git-alt"

[project.theme.palette]
primary = "custom"
accent = "custom"

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.abbr]

[project.markdown_extensions.toc]
toc_depth = 1
permalink = "#"
baselevel = 1
separator = "_"

[project.plugins.search]

[project.plugins.autorefs]

[project.plugins.literate_nav]
nav_file = "README.md"
implicit_index = true

[project.plugins.mkdocstrings.handlers.python]
inventories = [
    "https://docs.python.org/3/objects.inv",
]
paths = [
    "packages/microbial_strain_data_model/src",
    "packages/microbial_strain_data_utils/src",
]

[project.plugins.mkdocstrings.handlers.python.options]
heading_level = 2
allow_inspection = true
find_stubs_package = true
show_submodules = true
show_root_heading = false
unwrap_annotated = true
show_source = true
show_signature = true
show_signature_annotations = true
show_signature_type_parameters = true
show_attribute_values = true
show_symbol_type_heading = true
show_docstring_attributes = false
show_docstring_functions = false
show_docstring_classes = false
show_docstring_type_aliases = false
show_docstring_modules = false
show_docstring_description = true
show_docstring_examples = true
show_docstring_other_parameters = false
show_docstring_parameters = true
show_docstring_raises = true
show_docstring_receives = true
show_docstring_returns = true
show_docstring_type_parameters = true
show_docstring_warns = true
show_docstring_yields = true
show_overloads = true
show_bases = true
show_labels = true
show_if_no_docstring = false
skip_local_inventory = false
merge_init_into_class = true
separate_signature = false
signature_crossrefs = true
modernize_annotations = true
overloads_only = true
annotations_path = "brief"
parameter_headings = true
type_parameter_headings = true
group_by_category = true
summary = false
docstring_style = "google"
docstring_section_style = "table"
filters = [
    "!^_",
    "!^__",
]
extensions = [
    { griffe_pydantic = { schema = false } },
]

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
ignore_init_summary = false
trim_doctest_flags = true

[[project.nav]]
About = [
    "index.md",
    "background.md",
    "technical.md",
    "license.md",
]

[[project.nav]]
"Data schema" = [
    "schema/01. version.md",
    "schema/02. primaryId.md",
    "schema/03. organismType.md",
    "schema/04. morphType.md",
    "schema/05. typeStrain.md",
    "schema/06. taxon.md",
    "schema/07. identifier.md",
    "schema/08. origin.md",
    "schema/09. legal.md",
    "schema/10. pathogenicity.md",
    "schema/11. bioSafety.md",
    "schema/12. morphology.md",
    "schema/13. wallConstituents.md",
    "schema/14. staining.md",
    "schema/15. sporeFormation.md",
    "schema/16. growthConditions.md",
    "schema/17. cultivationMedia.md",
    "schema/18. sequences.md",
    "schema/19. gcContent.md",
    "schema/20. fattyAcidProfiles.md",
    "schema/21. hemolysis.md",
    "schema/22. halophily.md",
    "schema/23. tolerances.md",
    "schema/24. enzymes.md",
    "schema/25. metabolites.md",
    "schema/26. knownApplications.md",
    "schema/27. collections.md",
    "schema/28. literature.md",
    "schema/29. otherMedia.md",
    "schema/30. relatedData.md",
    "schema/31. sources.md",
]

[[project.nav]]
Python = [
    "python/microbe.md",
    "python/sub_classes.md",
]

[[project.nav]]
Graph = [
    "graph.md",
]

[[project.nav]]
Examples = [
    "examples/bacteria.md",
    "examples/fungi.md",
]
