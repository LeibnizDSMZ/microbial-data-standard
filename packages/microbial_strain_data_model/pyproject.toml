[project]
name = "microbial-strain-data-model"
version = "0.12.12"
description = """This project defines a new microbial strain data standard for all data describing a microbial strain."""
readme = "README.md"
authors = [{ name = "Julius Witte" },{ name = "Artur Lissin", email = "artur.lissin@dsmz.de" },]
requires-python = ">=3.13,<4"
dependencies = [
  "pydantic >=2.13,<3",
  "pydantic[email] >=2.13,<3",
  "pydantic_extra_types[pycountry] >=2.11,<3",
  "pydantic_extra_types[pendulum] >=2.11,<3",
  "anytree >=2.13,<3",
  "jsonref >=1.1,<2",
  "jsonschema >=4.26,<5",
  "deepdiff >=9.1,<10"
]

[project.scripts]
echo_model = "microbial_strain_data_model.main:run"


[tool.setuptools.packages.find]
where = ["src"]
include = ["microbial_strain_data_model"]

[build-system]
requires = ["uv_build>=0.11.26,<0.12.12"]
build-backend = "uv_build"

[tool.uv]
package = true
default-groups = []
